blueprint:
  name: Sourdough — Take Out of Fridge (Day Before)
  description: >
    For fridge-stored, weekly-fed starters: each day at a chosen time, check
    whether the next feeding is due within 24 hours and, if so, remind you to
    take the starter out of the fridge so it can warm up before feeding.
  domain: automation
  source_url: https://github.com/flowerpotmf/Sourdough-Watcher/blob/main/blueprints/automation/sourdough/fridge_day_before.yaml
  input:
    next_feeding_sensor:
      name: Next Feeding Due sensor
      description: The Sourdough Monitor "Next Feeding Due" timestamp sensor.
      selector:
        entity:
          filter:
            integration: sourdough
            domain: sensor
    check_time:
      name: Daily check time
      description: Time of day to check whether a feeding is due tomorrow.
      default: "18:00:00"
      selector:
        time:
    notify_service:
      name: Notify service
      description: 'Notify service to call, e.g. notify.mobile_app_your_phone'
      default: notify.notify
      selector:
        text:
    message:
      name: Message
      default: "🍞 Take your sourdough starter out of the fridge — feeding due tomorrow."
      selector:
        text:

variables:
  next_feeding_sensor: !input next_feeding_sensor

trigger:
  - platform: time
    at: !input check_time

condition:
  - condition: template
    value_template: >
      {% set due = states(next_feeding_sensor) %}
      {% if due in ['unknown', 'unavailable', ''] %}
        false
      {% else %}
        {{ 0 < (as_timestamp(due) - as_timestamp(now())) < 86400 }}
      {% endif %}

action:
  - service: !input notify_service
    data:
      message: !input message

mode: single

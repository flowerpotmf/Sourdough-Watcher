name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Check code style and imports
        run: ruff check custom_components/sourdough/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  release:
    name: Create Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    # Only run on direct pushes to main (i.e. after a PR is merged)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/sourdough/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # A leftover tag (e.g. pushed from a stale branch) would otherwise be
      # silently reused by `gh release create`, publishing a release whose
      # contents don't match the version it claims to be. Check for both the
      # release and the tag, and fail loudly if a mismatched tag exists.
      - name: Check if release or tag already exists
        id: tag_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release v$VERSION already exists; skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif TAG_SHA=$(git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" | cut -f1); then
            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag v$VERSION already exists at $TAG_SHA (not $GITHUB_SHA). Delete the stale tag or bump the version."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
